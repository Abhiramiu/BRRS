# Oracle DataSource
datasrc.username=BRRS
datasrc.password=brrs@new
datasrc.url=jdbc:oracle:thin:@103.11.152.132:1521/BRRS

# FIXED: Use Oracle driver (was incorrectly set to MySQL)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.current_session_context_class=org.springframework.orm.hibernate5.SpringSessionContext

# Performance - disable expensive logging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# Performance - faster startup
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# Hibernate batch settings
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.batch_versioned_data=true

# HikariCP - tuned for Oracle
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM DUAL

# Session
spring.session.store-type=jdbc
spring.session.timeout=18000

# Server
server.port=8089
server.servlet.context-path=/BRRS
server.error.whitelabel.enabled=false
server.error.path=/error

# File uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.resources.add-mappings=true

# App defaults
default.password=Bornfire@123
default.pagesize=5000

# File paths	
output.exportpath=D:/
output.exportpathfinal=D:/BRRS_REPORTS/FINALTEMP/
output.exportpathtemp=D:/BRRS_REPORTS/SOURCETEMP/

# Mail
mail.host=webmail.bornfire.in
mail.port=25
mail.username=brbs@bornfire.in
mail.password=brbs@Bornfire@123

# Logging
debug=false
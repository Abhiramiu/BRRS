<script th:inline="javascript">

		$(document).ready(function() {
		    $('#loader').modal('hide');
		});
		
		$(window).on("pageshow", function(event) {
		    $('#loader').modal('hide');
		});

	

	function home() {
        $("#loader").modal("toggle");
		location.href = 'Dashboard'
	}

	function back() {
        $("#loader").modal("toggle");

		window.history.back();
	}

	function check(a) {

	    var srl_no = a.getAttribute("data-srl_no");
	    var rpt_code = a.getAttribute("data-rpt_code");
	    var report_date = a.getAttribute("data-todate");

	    // remove this alert if not needed
	    // alert(report_date);

	    var url = "./BRRSValidationsChk?srl_no=" + srl_no +
	              "&rpt_code=" + rpt_code +
	              "&report_date=" + report_date;

	    $("#reportform").attr('action', url);

	    var options = {
	        success: showResponse
	    };

	    $("#reportform").ajaxSubmit(options);

	    function showResponse(responseText, statusText, xhr, $form) {

	        // Set response message in modal
	        $("#alertmsg").text(responseText.status);

	        // Show modal
	        $("#alert").modal("show");

	        if (responseText.genID == "1") {
	            // success case
	            $("#alertmsg").text(responseText.status);
	        } else {
	            // failure case
	            $("#alertmsg").text(responseText.status);
	        }
	    }
	}

	function list() {
	    location.reload();
	}
	function getReport(a) {

	    var fromdate = a.getAttribute("data-fromdate");
	    var todate = a.getAttribute("data-todate");
	    var asondate = a.getAttribute("data-todate");
	    var reportid = a.getAttribute("data-rptcode");

	    let validationFailed = false;

	    document.querySelectorAll('tbody .userlist').forEach(function (row) {
	        var cur_status = row.querySelectorAll('td')[4].textContent.trim();

	        if (cur_status === 'Not ok' || cur_status === '') {
	            validationFailed = true;
	        }
	    });

	    const loader = bootstrap.Modal.getOrCreateInstance(document.getElementById('loader'), {
	        backdrop: 'static',
	        keyboard: false
	    });

	 /*    // ❌ STOP everything if validation fails
	    if (validationFailed) {
	        loader.hide();
	        alert("Validation Failed. Report cannot be generated.");
	        return; // 🔴 HARD STOP
	    } */

	    // ✅ Only comes here if ALL are OK
	    const confirmModalEl = document.getElementById('confirmModal');
	    const confirmModal = bootstrap.Modal.getOrCreateInstance(confirmModalEl);
	    const confirmYesBtn = document.getElementById('confirmYes');

	    confirmModalEl.addEventListener('shown.bs.modal', () => {
	        confirmYesBtn.focus();
	    }, { once: true });

	    function openReport() {
	        confirmModal.hide();
	        loader.show();

	        const type = 'BRRS';
	        location.href = "Reports/" + reportid +
	            "?dtltype=report&fromdate=" + fromdate +
	            "&todate=" + todate +
	            "&type=" + type +
	            "&asondate=" + asondate;
	    }

	    confirmModal.show();
	    confirmYesBtn.onclick = openReport;
	}

		$(document).ready(function () {
		    // Hide loader when validation modal is shown
		    $('#validationModal').on('shown.bs.modal', function () {
		        $('#loader').modal('hide');
		    });
		});

	

	    
	
	
	$(document).ready(function () {
	    // Hide loader when validation modal is shown
	    $('#validationModal').on('shown.bs.modal', function () {
	        $('#loader').modal('hide');
	    });
	});


	
    </script>

<title>BRRSVALIDATION</title>
<body>
	<div class="container-fluid"
		style="padding-left: 0px; padding-right: 0px;">
		<div class="row">

			<div th:insert="HeaderMenu :: header"></div>


			<div class="card">

				<div class="card-header"
					style="background-color: rgb(107, 122, 143); display: flex; align-items: center; justify-content: space-between;">
					<div style="display: flex; align-items: center;" onclick="back();">
						<!-- ⬅️ Left circular arrow -->
						<div class="left-arrow-circle">
							<i class="fa fa-arrow-left"></i>
						</div>
						<!-- Title -->
						<h5
							style="font-family: arial; font-size: 20px; padding-top: 10px; font-weight: bold; color: white;">BRRS
							Report Validations</h5>
					</div>

					<div class="custom-tab-btn-group nav-buttons"
						style="display: flex; color: white; align-items: center;">

						<!-- Buttons -->

						<button type="button" class="custom-tab-btn"
							id="custom-tab-btnSummary"
							th:attr="data-rptcode=${reportlist1.rptCode},data-fromdate=${#dates.format(reportlist1.startDate, 'dd/MM/yyyy')},data-todate=${#dates.format(reportlist1.endDate, 'dd/MM/yyyy')}"
							onclick="getReport(this);">Report</button>
					</div>
				</div>



				<div class="row">
					<div class="col-sm-12">
						<div class="table-container scrollable-table-container" style="max-height: 620px;">
							<form action="#" th:object="${reportform}" method="post"
								autocomplete="off" id="reportform">
								<table class="table table-striped table-bordered table-hover"
									id="BRRSvalidation">
									<thead style="background-color: #e9ecf0; font-family: Arial;">
										<tr>
											<th>Validation Details</th>
											<th>Tables</th>
											<th>Check</th>
											<th>Validation</th>
											<th>Description</th>
										</tr>
									</thead>
									<tbody style="font-family: Arial;">

										<tr th:each="validationlist : ${reportlist}" class="userlist">

											<td class="wrap-text" th:text="${validationlist.val_det}"></td>
											<td th:text="${validationlist.val_tables}"></td>

											<td>
												<button class="btn-primary" type="button"
													th:attr="data-srl_no=${validationlist.srl_no},data-todate=${rpt_date}"
													onclick="check(this);">Check</button>
											</td>

											<!-- Hidden status -->
											<td class="status" style="display: none;"
												th:text="${validationlist.cur_status}"></td>

											<th:block>
												<!-- OK -->
												<td
													th:if="${validationlist.cur_status != null and #strings.equalsIgnoreCase(validationlist.cur_status, 'Y')}"
													style="color: green;">Ok</td>

												<!-- NOT OK (N / n / NULL / empty) -->
												<td
													th:if="${validationlist.cur_status == null 
                or validationlist.cur_status == '' 
                or #strings.equalsIgnoreCase(validationlist.cur_status, 'N')}"
													style="color: red;">Not ok</td>

												<!-- Remarks -->
												<td class="wrap-text" th:text="${validationlist.remarks2}"></td>
											</th:block>

										</tr>
									</tbody>
								</table>
							</form>
						</div>


					</div>
				</div>
			</div>



		</div>

		<div class="modal fade" id="loader" data-backdrop="static"
			data-keyboard="false">
			<div
				class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
				<div class="modal-content" style="background: transparent;">
					<div class="modal-body" style="text-align: center">
						<div>
							<img th:src=@{/images/loader.gif} id="bfirelogo"
								style="width: 153px; height: auto; margin-left: 18px; background-color: transparent; border-color: transparent;"
								alt="Bornfire">
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="validationModal" tabindex="-1"
			role="dialog" aria-labelledby="validationModalLabel"
			aria-hidden="true">
			<div class="modal-dialog" role="document">
				<div class="modal-content">
					<div class="modal-header">
						<h5 id="validationModalLabel">Validation Failed</h5>
						<button type="button" class="close" data-dismiss="modal"
							aria-label="Close">
							<span aria-hidden="true">&times;</span>
						</button>
					</div>
					<div class="modal-body">
						<p>Validation failed: Do you still want to generate the
							report?</p>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-secondary"
							data-dismiss="modal">Cancel</button>
						<button type="button" class="btn btn-primary"
							id="confirmGenerateReport">Generate Report</button>
					</div>
				</div>
			</div>
		</div>
		
		<div class="modal fade" id="alert">
		<div
			class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
			<div class="modal-content">
			<div class="menu-title-header">
					<div class="modal-title" id="exampleModalLabel"
						style="text-align: center; color: white;">BANK OF BARODA</div>
				</div>
				<div class="modal-body" style="text-align: center">
					<p id="alertmsg"></p>
					<button type="button" class="custom-tab-btn " onclick="list()"
						data-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>

	</div>








	<!-- Custom Confirm Modal -->
	<div class="modal fade" id="confirmModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content">

				<!-- Custom styled header -->
				<div class="menu-title-header">
					<div class="modal-title" id="confirmModalLabel"
						style="text-align: center; color: white;">Do you want to
						open the report?</div>
				</div>

				<!-- Modal body -->
				<div class="modal-body"
					style="text-align: center; font-size: 1.1rem;">

					<!-- Custom styled buttons -->
					<div style="margin-top: 15px;">
						<button type="button" class="custom-tab-btn"
							data-bs-dismiss="modal">Cancel</button>
						<button type="button" id="confirmYes" class="custom-tab-btn"
							style="background-color: #5c7495; color: white;">Yes</button>
					</div>
				</div>

			</div>
		</div>
	</div>

</body>
